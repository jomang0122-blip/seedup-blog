name: TEST — DART API 구조 확인 (일회성, 완료 후 삭제 예정)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: DART Open API 응답 구조 확인
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          TODAY=$(date +%Y%m%d)
          echo "=== 1) 오늘 전체 공시 목록 (list.json, corp_code 없이) ==="
          curl -s "https://opendart.fss.or.kr/api/list.json?crtfc_key=${DART_API_KEY}&bgn_de=${TODAY}&end_de=${TODAY}&page_no=1&page_count=100" -o list_today.json
          python3 -c "
          import json
          with open('list_today.json', encoding='utf-8') as f:
              data = json.load(f)
          print('status:', data.get('status'), '/ message:', data.get('message'))
          print('total_count:', data.get('total_count'), '/ total_page:', data.get('total_page'))
          items = data.get('list', []) or []
          print(f'이번 페이지 건수: {len(items)}')
          print()
          print('--- stock_code 있는 항목(상장사) 샘플 5개 ---')
          listed = [x for x in items if x.get('stock_code', '').strip()]
          for x in listed[:5]:
              print(f\"  corp_name={x.get('corp_name')} | corp_code={x.get('corp_code')} | stock_code={x.get('stock_code')} | report_nm={x.get('report_nm')} | rcept_dt={x.get('rcept_dt')}\")
          print()
          print(f'상장사(stock_code 존재) 건수: {len(listed)} / 전체 {len(items)}')
          "
          echo ""
          echo "=== 2) 데이터 없는 날짜 테스트 (일요일 등, status 013 확인용) ==="
          curl -s "https://opendart.fss.or.kr/api/list.json?crtfc_key=${DART_API_KEY}&bgn_de=20260101&end_de=20260101&page_count=5" -o list_empty.json
          python3 -c "
          import json
          with open('list_empty.json', encoding='utf-8') as f:
              data = json.load(f)
          print('status:', data.get('status'), '/ message:', data.get('message'))
          print('list 필드 존재 여부:', 'list' in data)
          "
          echo ""
          echo "=== 3) corp_code 파라미터로 특정 회사만 필터링 되는지 확인 (삼성전자=00126380) ==="
          curl -s "https://opendart.fss.or.kr/api/list.json?crtfc_key=${DART_API_KEY}&corp_code=00126380&bgn_de=20260601&end_de=${TODAY}&page_count=10" -o list_samsung.json
          python3 -c "
          import json
          with open('list_samsung.json', encoding='utf-8') as f:
              data = json.load(f)
          print('status:', data.get('status'), '/ message:', data.get('message'))
          items = data.get('list', []) or []
          print(f'삼성전자(corp_code=00126380) 최근 공시 건수: {len(items)}')
          for x in items[:5]:
              print(f\"  {x.get('rcept_dt')} | {x.get('report_nm')}\")
          "
          echo ""
          echo "=== 4) corpCode.xml (종목명→corp_code 매핑 파일) 존재 여부 확인 ==="
          HTTP_CODE=$(curl -s -o corpcode.zip -w "%{http_code}" "https://opendart.fss.or.kr/api/corpCode.xml?crtfc_key=${DART_API_KEY}")
          echo "HTTP 상태 코드: $HTTP_CODE"
          file corpcode.zip
          ls -la corpcode.zip
