name: TEST — DART 실적공시 보고서명 확인 (일회성, 완료 후 삭제 예정)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: 7/23 전체 공시에서 OCI홀딩스 및 실적관련 보고서명 확인
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          echo "=== 오늘(7/23) 전체 공시 중 '실적' 또는 '잠정' 포함 보고서명 샘플 ==="
          curl -s "https://opendart.fss.or.kr/api/list.json?crtfc_key=${DART_API_KEY}&bgn_de=20260723&end_de=20260723&page_count=100" -o all.json
          python3 -c "
          import json
          with open('all.json', encoding='utf-8') as f:
              data = json.load(f)
          items = data.get('list') or []
          seen = set()
          for x in items:
              nm = x.get('report_nm', '')
              if ('실적' in nm or '잠정' in nm or '공정공시' in nm) and nm not in seen:
                  seen.add(nm)
                  print(f\"{x.get('corp_name')} | {nm}\")
          print('총', len(items), '건 중 실적관련', len(seen), '종류')

          print()
          print('=== 오늘 특징주 종목 전체 DART 공시 확인 ===')
          targets = ['SK이터닉스','SK오션플랜트','HD현대에너지솔루션','삼성E&A','GS건설',
                     '삼성전기','OCI홀딩스','파마리서치','롯데쇼핑','케이씨텍',
                     'JB금융지주','KB발해인프라','한미반도체']
          for name in targets:
              matched = [x for x in items if x.get('corp_name') == name]
              if matched:
                  for x in matched:
                      print(f\"{name} | {x.get('report_nm')}\")
              else:
                  print(f\"{name} | (공시 없음)\")
          "
